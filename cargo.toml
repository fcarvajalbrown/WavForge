[package]
name = "wavforge"
version = "0.1.0"
edition = "2021"
description = "A lightweight, clean audio editor"

[[bin]]
name = "wavforge"
path = "src/main.rs"

[dependencies]
rfd = "0.17.2"
env_logger = "0.11.9"
# UI + app shell
eframe = "0.33.3"
egui = "0.33.3"
log = "0.4.29"
rubato = "1.0.1"

# Audio I/O (playback/recording)
cpal = "0.17.3"

# Audio decoding (MP3, FLAC, OGG, WAV, AIFF)
symphonia = { version = "0.5.5", features = [
    "mp3",
    "flac",
    "ogg",
    "vorbis",
    "wav",
    "aiff",
] }

# Thread-safe communication between audio thread and UI thread
crossbeam-channel = "0.5.15"

[profile.release]
opt-level = 3
strip = true

# Keep debug info in dev builds for easier profiling
[profile.dev]
opt-level = 1